name: Vgmstream オートコンバート ミッション

on:
  push:
    paths:
      - 'input_audio/**' # input_audioフォルダへの変更を検知
  workflow_dispatch: # 手動実行ボタン

# リポジトリへの書き込み権限を許可（プッシュに必須）
permissions:
  contents: write

jobs:
  convert-audio:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🛠️ 依存ライブラリの補給 (Ubuntu環境整備)
        run: |
          echo "[LOG] [ACTION] 共有ライブラリをインストール中..."
          sudo apt-get update
          sudo apt-get install -y libmpg123-0 libvorbisfile3 libspeex1 libavformat60 libavcodec60 libavutil-58 libswresample-4

      - name: 🔧 バイナリの診断と準備
        run: |
          echo "[LOG] [ACTION] 兵装庫から展開中..."
          tar -xzf vgmstream-linux-cli.tar.gz
          chmod +x vgmstream-cli
          
          echo "[LOG] [ACTION] 依存関係のチェックを実行 (ldd) ..."
          ldd ./vgmstream-cli
          
          echo "[LOG] [ACTION] テスト実行..."
          ./vgmstream-cli -i || echo "[LOG] [WARN] 起動に失敗しました（Code: $?）"

      - name: 🎧 音声変換ミッション実行（階層維持スキャン）
        run: |
          echo "[LOG] [ACTION] 変換処理を開始します（フォルダ構造を維持）..."
          
          # findでinput_audio内の全ファイルを再帰的に検索
          find input_audio -type f | while read -r file; do
            # 相対パスの取得 (例: stage1/bgm/theme.adx)
            relative_path="${file#input_audio/}"
            
            # 出力先ディレクトリの特定と作成 (例: output_wav/stage1/bgm)
            target_dir="output_wav/$(dirname "$relative_path")"
            mkdir -p "$target_dir"
            
            # 出力ファイル名の設定
            output_file="output_wav/${relative_path}.wav"
            
            echo "[LOG] [INFO] 変換中: $file -> $output_file"
            
            # vgmstream実行
            ./vgmstream-cli -o "$output_file" "$file"
            
            if [ $? -eq 0 ]; then
              echo "[LOG] [SUCCESS] 変換完了: $output_file"
            else
              echo "[LOG] [ERROR] 失敗したためスキップします: $file"
            fi
          done

      - name: 💾 成果物をリポジトリにコミット＆プッシュ
        run: |
          echo "[LOG] [ACTION] Gitのユーザー設定を開始..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          echo "[LOG] [ACTION] 成果物をステージングエリアに追加..."
          # output_wav フォルダ内の全ファイルを階層ごと追加
          git add output_wav/
          
          # 変更がある場合のみコミット＆プッシュ
          if ! git diff --cached --quiet; then
            echo "[LOG] [INFO] 新しいWAVファイルを検知しました。"
            git commit -m "Github Actions push the wav audio"
            
            echo "[LOG] [ACTION] リポジトリへプッシュ中..."
            git push
            echo "[LOG] [SUCCESS] 成果物のプッシュが完了しました！"
          else
            echo "[LOG] [INFO] 変更がないため、プッシュを省略します。"
          fi

      - name: 📤 念のためアーティファクトとしても保存
        uses: upload-artifact@v4
        with:
          name: converted-wav-files
          path: output_wav/
          retention-days: 3
