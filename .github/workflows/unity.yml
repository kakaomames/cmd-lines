name: Unity Downloader

on:
  workflow_dispatch:

jobs:
  download-unity:
    runs-on: ubuntu-latest
    steps:
      - name: Download Unity 2020.3.48f1
        run: |
          # 2020.3.48f1のインストーラー用URL
          # ※URLは公式アーカイブに基づいた構造を使用
          URL="https://download.unity3d.com/download_unity/f304a73772f1/LinuxEditorInstaller/Unity.tar.xz"
          
          echo "Downloading Unity 2020.3.48f1..."
          sudo apt-get install -y aria2
          aria2c -x 16 -s 16 $URL
          
          echo "Download complete!"
          ls -l Unity.tar.xz
