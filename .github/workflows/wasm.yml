name: Wasm Auto Synchronizer (GitHub CLI Edition)

on:
  workflow_dispatch: # ボタン一発で手動起動！

permissions:
  contents: write # リポジトリへの書き込み権限をフル解放！

jobs:
  sync-wasm:
    runs-on: ubuntu-latest

    steps:
      - name: 1. リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 2. Buildフォルダがなければ自動作成
        run: mkdir -p Build

      - name: 3. GitHub公式CLIでタグからWasmリソースを直接救出！
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 公式CLIにトークンを叩き込む！
        run: |
          # gh release download [タグ名] --repo [リポジトリ名] --pattern [ファイル名] --dir [保存先]
          gh release download wasm --repo "kakaomames/cmd-lines" --pattern "2410211.wasm.unityweb" --dir "Build/"

      - name: 4. 値の変更（配置完了）をmissionLogで報告！
        run: |
          echo "=== missionLog: VALUE_CHANGE ==="
          ls -la Build/2410211.wasm.unityweb
          echo "GitHub CLI を使用して、wasmタグからの抽出に完全成功しました！"

      - name: 5. メインリポジトリへ自動コミット＆プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action [Bot]"
          git add Build/2410211.wasm.unityweb
          
          if ! git diff --cached --quiet; then
            git commit -m "VALUE_CHANGE: GitHub CLIによりWasmタグからリソースを自動統合 [skip ci]"
            git push origin main
          else
            echo "変更がありません。処理をスキップします。"
          fi
