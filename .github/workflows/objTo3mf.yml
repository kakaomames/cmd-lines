name: 🚀A1mini全自動・最新抽出スライサー

on:
  push:
    paths:
      - 'モデル/*.obj'
  workflow_dispatch:

jobs:
  slice_and_push:
    name: 📐 最新抽出・スライスと保存
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🔧 依存パーツを装備（WebKitを補強）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-client0 libwayland-cursor0 libwayland-egl1 \
            libxkbcommon0 libdbus-1-3 libegl1-mesa libgl1-mesa-dri libgl1-mesa-glx \
            libglu1-mesa libxcursor1 libxinerama1 libxi6 libxrandr2 libxtst6 fuse \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 xvfb \
            libwebkit2gtk-4.0-37 # ← これが今回のターゲットだ！
          
          echo "[missionLog] ACTION: WebKitの装着を確認。これで視界はクリアだ！"

      - name: 🔧 依存パーツを装備
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-client0 libwayland-cursor0 libwayland-egl1 \
            libxkbcommon0 libdbus-1-3 libegl1-mesa libgl1-mesa-dri libgl1-mesa-glx \
            libglu1-mesa libxcursor1 libxinerama1 libxi6 libxrandr2 libxtst6 fuse \
            libgstreamer1.0-0 libgstreamer-plugins-base1.0-0 xvfb
          echo "[missionLog] ACTION: 基本パーツ装着完了！"
      - name: 🔍 APIから最新のUbuntu用AppImageを抽出
        run: |
          # 1. 最新のリリース情報を一括取得
          RELEASE_JSON=$(curl -s https://api.github.com/repos/bambulab/BambuStudio/releases/latest)
          
          # 2. タグ名を抽出 (例: v02.06.00.51)
          TAG_NAME=$(echo "$RELEASE_JSON" | grep -oP '"tag_name": "\K[^"]+')
          
          # 3. Ubuntu用AppImageのファイル名を抽出
          FILE_NAME=$(echo "$RELEASE_JSON" | grep -oP '[^"]+ubuntu[^"]+\.AppImage' | head -n 1)
          
          # 4. 合体させて完全なURLを作る！
          LATEST_URL="https://github.com/bambulab/BambuStudio/releases/download/${TAG_NAME}/${FILE_NAME}"
          
          if [ -z "$FILE_NAME" ] || [ -z "$TAG_NAME" ]; then
            echo "[missionLog] ERROR: Ubuntu用のAppImageまたはタグ名が見つからなかったぞ！"
            exit 1
          fi
          
          echo "LATEST_URL=$LATEST_URL" >> $GITHUB_ENV
          echo "[missionLog] DATA_CHANGE: 最新エンジン (${TAG_NAME}) を捕捉！ -> $LATEST_URL"

      - name: 🛸 最新版を召喚
        run: |
          wget "${{ env.LATEST_URL }}" -O slicer.AppImage
          chmod +x slicer.AppImage

      - name: 📦 AppImage を解凍
        run: |
          ./slicer.AppImage --appimage-extract
          echo "[missionLog] ACTION: 抽出したエンジンを解凍したぞ！"

      - name: 🔍 エンジンから「正解のJSON」を書き出す
        run: |
          # 内部ライブラリ参照
          export LD_LIBRARY_PATH=$PWD/squashfs-root/usr/lib:$LD_LIBRARY_PATH
          
          # エンジンにデフォルト設定を JSON で出力させる
          xvfb-run ./squashfs-root/AppRun --export-settings config_sample.json
          
          echo "[missionLog] DATA_CHANGE: エンジンが認める『正解の形』を config_sample.json に書き出したぞ！"
          # 中身をログに出力して確認
          cat config_sample.json




          

      - name: 📐 内部パーツでスライス実行（v2.6 CLI 最終適合仕様）
       id: ls
       run: |
         ls -F
         
      - name: 📐 内部パーツでスライス実行（v2.6 CLI 最終適合仕様）
        id: run_slice
        run: |
          # 1. ライブラリパス設定
          export LD_LIBRARY_PATH=$PWD/squashfs-root/usr/lib:$LD_LIBRARY_PATH
          
          # 2. 【生命線】ソフトウェア描画強制
          export GALLIUM_DRIVER=swrast
          export LIBGL_ALWAYS_SOFTWARE=1
          
          # 3. ターゲット決定
          FULL_PATH=$(ls モデル/*.obj | head -n 1)
          FILE_NAME=$(basename "$FULL_PATH" .obj)
          OUTPUT_PATH="モデル/${FILE_NAME}.3mf"
          
          echo "FILE_NAME=${FILE_NAME}" >> $GITHUB_ENV

          # 4. 実行（ヘルプに忠実な、最もシンプルな構成）
          # --slice 0 は「すべてのプレートをスライス」という意味で必須だ
          xvfb-run -a -s "-screen 0 1280x1024x24" ./squashfs-root/AppRun \
            --slice 0 \
            --export-3mf "$OUTPUT_PATH" \
            "$FULL_PATH"
          
          echo "[missionLog] ACTION: 邪魔なフラグを排除し、純粋なスライス命令を送信したぞ！"




          

      - name: 💾 git add . で全部保存！
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Gemini-Programming-Unit"
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 自動スライス（最新API抽出）: ${{ env.FILE_NAME }}"
            git push
            echo "[missionLog] COMPLETE: リポジトリを最新に保ったぞ！"
          else
            echo "[missionLog] SKIP: 変更なし！"
          fi

      - name: 📮 Vercelへ通知
        run: |
          curl -X POST -d '{"status":"pushed", "model":"${{ env.FILE_NAME }}"}' \
          -H "Content-Type: application/json" \
          https://your-project.vercel.app/api/notify
