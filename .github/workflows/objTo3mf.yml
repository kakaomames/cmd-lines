name: 🚀A1mini全自動・一括保存スライサー

on:
  push:
    paths:
      - 'モデル/*.obj'
  # これを追加すると「ボタンポチ」が可能になるぞ！
  workflow_dispatch:

jobs:
  slice_and_push:
    name: 📐 スライスと一括保存
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🔧 依存パーツをフル装備（GStreamer追加）
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-client0 libwayland-cursor0 libwayland-egl1 \
            libxkbcommon0 libdbus-1-3 libegl1-mesa libgl1-mesa-dri libgl1-mesa-glx \
            libglu1-mesa libxcursor1 libxinerama1 libxi6 libxrandr2 libxtst6 fuse \
            libgstvideo-1.0-0 libgstapp-1.0-0 libgstrtspserver-1.0-0 libpwquality-dev \
            libwebkit2gtk-4.0-37 # これらが足りなかった可能性が高い
          
          echo "[missionLog] ACTION: 依存ライブラリの補強が完了したぞ！"

      - name: 🛸 Bambu Studio v2.6.0 召喚
        run: |
          wget https://github.com/bambulab/BambuStudio/releases/download/v02.06.00.51/BambuStudio_ubuntu-22.04-v02.06.00.51-20260417160415.AppImage
          mv *.AppImage slicer.AppImage
          chmod +x slicer.AppImage

      - name: 📐 同じ名前でスライス実行
        id: run_slice
        run: |
          # ターゲットのobjを探す
          FULL_PATH=$(ls モデル/*.obj | head -n 1)
          if [ -z "$FULL_PATH" ]; then
            echo "[missionLog] ERROR: モデルが見つからないぞ！"
            exit 1
          fi
          
          FILE_NAME=$(basename "$FULL_PATH" .obj)
          OUTPUT_PATH="モデル/${FILE_NAME}.3mf"
          
          echo "FILE_NAME=${FILE_NAME}" >> $GITHUB_ENV
          echo "[missionLog] ACTION: '${FILE_NAME}' のスライスを開始！"
          
          ./slicer.AppImage --slice \
          --load-config 設定/a1mini_基本設定.ini \
          --output "$OUTPUT_PATH" \
          "$FULL_PATH"
          
          echo "[missionLog] VALUE_CHANGE: '${OUTPUT_PATH}' 完了！"

      - name: 💾 git add . で全部保存！
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Gemini-Programming-Unit"
          
          git add .
          
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "🤖 スライス実行（ボタンポチ対応）: ${{ env.FILE_NAME }}"
            git push
            echo "[missionLog] COMPLETE: リポジトリを更新しました！"
          else
            echo "[missionLog] SKIP: 変更がないため保存をスキップします。"
          fi

      - name: 📮 Vercelサーバーへ通知
        run: |
          curl -X POST -d '{"status":"pushed", "model":"${{ env.FILE_NAME }}"}' \
          -H "Content-Type: application/json" \
          https://カカオマメのプロジェクト.vercel.app/api/notify
