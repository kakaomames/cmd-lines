name: 🚀A1mini全自動・一括保存スライサー

on:
  push:
    paths:
      - 'モデル/*.obj'

jobs:
  スライスと一括保存:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: 📥 コードをチェックアウト
        uses: actions/checkout@v4

      - name: 🔧 依存パーツ装備
        run: |
          sudo apt-get update
          sudo apt-get install -y libwayland-client0 libwayland-cursor0 libwayland-egl1 \
          libxkbcommon0 libdbus-1-3 libegl1-mesa libgl1-mesa-dri libgl1-mesa-glx \
          libglu1-mesa libxcursor1 libxinerama1 libxi6 libxrandr2 libxtst6 fuse

      - name: 🛸 Bambu Studio v2.6.0 召喚
        run: |
          wget https://github.com/bambulab/BambuStudio/releases/download/v02.06.00.51/BambuStudio_ubuntu-22.04-v02.06.00.51-20260417160415.AppImage
          mv *.AppImage slicer.AppImage
          chmod +x slicer.AppImage

      - name: 📐 スライス実行
        run: |
          FULL_PATH=$(ls モデル/*.obj | head -n 1)
          FILE_NAME=$(basename "$FULL_PATH" .obj)
          # 同じ名前で3mfを生成
          OUTPUT_PATH="モデル/${FILE_NAME}.3mf"
          
          echo "[missionLog] DATA_CHANGE: '${FILE_NAME}' のスライスを開始します..."
          
          ./slicer.AppImage --slice \
          --load-config 設定/a1mini_基本設定.ini \
          --output "$OUTPUT_PATH" \
          "$FULL_PATH"
          
          echo "[missionLog] VALUE_CHANGE: '${OUTPUT_PATH}' が完成したぞ！"

      - name: 💾 git add . で全部保存！
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Gemini-Programming-Unit"
          
          # 全部まとめてステージング！
          git add .
          
          # 変化があればコミットしてプッシュ
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 自動スライス完了: ${FILE_NAME}" && git push)
          
          echo "[missionLog] COMPLETE: リポジトリの更新が完了しました！"

      - name: 📮 Vercelサーバーへ「完了」を報告
        run: |
          curl -X POST -d '{"status":"pushed"}' \
          -H "Content-Type: application/json" \
          https://カカオマメのプロジェクト.vercel.app/api/notify
