name: YT-DLP-test

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Run py-yt-dlp
        run: |
          # 1. どこに本体があるか探す（ログに出力して確認）
          echo "ファイル位置を探索中..."
          find . -name "__main__.py"
          
          # 2. 本体を見つけたらそのパスで実行する
          # findで見つけたパスを変数に入れる
          MAIN_PATH=$(find . -name "__main__.py" | head -n 1)
          
          if [ -z "$MAIN_PATH" ]; then
            echo "エラー: __main__.py が見つかりません！"
            ls -R  # 念のため全構造を表示
            exit 1
          fi
          
          echo "本体を発見: $MAIN_PATH"
          python "$MAIN_PATH" -v
          
      - name:  yt-dlp
        run: |
          yt-dlp -v
          
      - name: Cleanup and Commit
        run: |
          # 1. まずGitのユーザー設定を確実に行う
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          # 2. セキュリティで弾かれた特定のファイルだけを削除対象にする
          # 全てのPythonファイルを消すと探検隊の武器がなくなってしまうからな！
          find . -name "shahid.py" -exec git rm -f {} \;
          
          # 3. .gitignoreに追記
          echo "**/shahid.py" >> .gitignore
          
          # 4. 追加とコミット
          git add .
          # 何も変更がない場合にエラーにならないよう || true を付ける
          git commit -m "yt-dlp cleaned ✨" || true
          
          # 5. プッシュ！
          git push
