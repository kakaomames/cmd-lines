name: YT-DLP-SETUP

on:
  workflow_dispatch: # 手動実行用

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install Emscripten
        run: |
          git clone https://github.com/emscripten-core/emsdk.git
          cp -fr emsdk/ emsdk2/
      - name: Install yt-dlp
        run: |
          rm -fdr yt-dlp-master/
          curl -v -L https://github.com/yt-dlp/yt-dlp/archive/refs/heads/master.zip -o yt-dlpv2.zip
          ls -l yt-dlpv2.zip
          unzip -t yt-dlpv2.zip
          unzip -o yt-dlpv2.zip
          
      - name: Cleanup and Commit
        run: |
          # 1. Gitユーザー設定
          git config --global user.name "Gemini-Bot"
          git config --global user.email "bot@example.com"
          
          # 2. リモートの変更を強制的に取り込む（fetchとmerge）
          git fetch origin
          # リモートの変更をローカルにマージ（競合しても強引に合わせる設定）
          git merge origin/main --no-edit || git rebase origin/main
          
          # 3. 追加とコミット
          git add .
          git commit -m "yt-dlp cleaned ✨" || true
          
          # 4. 強制プッシュ（これで通るはず！）
          git push -f origin main
