name: Vgmstream 完全自前ビルド・ミッション

on:
  push:
    paths:
      - 'input_audio/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-convert:
    runs-on: ubuntu-latest

    steps:
      - name: 📦 リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: 🛠️ 建設資材（ビルドツール）の補給
        run: |
          echo "[LOG] [ACTION] ビルドに必要なツールをインストール中..."
          sudo apt-get update
          sudo apt-get install -y build-essential cmake git libmpg123-dev libvorbis-dev libspeex-dev libavformat-dev libavcodec-dev libavutil-dev libswresample-dev

      - name: 🏗️ vgmstreamを現地で組み立て（ビルド）
        run: |
          echo "[LOG] [ACTION] 最新の設計図（ソースコード）を取得中..."
          # git clone --recursive https://github.com/vgmstream/vgmstream.git vgmstream_source
          
          echo "[LOG] [ACTION] コンパイル開始（CLI専用モード）..."
          # cd vgmstream_source
          # mkdir build && cd build
          # 不要なプラグインをすべてOFFにし、CLIのみを生成する設定
          ## cmake .. -DBUILD_CLI=ON -DBUILD_AUDACIOUS=OFF -DBUILD_WINAMP=OFF -DBUILD_XMPLAY=OFF
          # make -j$(nproc)
          
          echo "[LOG] [SUCCESS] バイナリ完成！"
          # cp cli/vgmstream-cli ../../vgmstream-cli
          # cd ../../
          chmod +x vgmstream-cli

      - name: 🎧 音声変換ミッション実行（階層維持）
        run: |
          echo "[LOG] [ACTION] 変換処理を開始します..."
          find input_audio -type f | while read -r file; do
            relative_path="${file#input_audio/}"
            target_dir="output_wav/$(dirname "$relative_path")"
            mkdir -p "$target_dir"
            
            output_file="output_wav/${relative_path}.wav"
            echo "[LOG] [INFO] 変換中: $file -> $output_file"
            
            ./vgmstream-cli -o "$output_file" "$file" || echo "[LOG] [ERROR] 変換失敗: $file"
          done

      - name: 💾 成果物をリポジトリにコミット＆プッシュ
        run: |
          echo "[LOG] [ACTION] Git設定と成果物の格納..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          if [ -d "output_wav" ]; then
            git add .
            if ! git diff --cached --quiet; then
              git commit -m "Github Actions push the wav audio (Built from source)"
              git push
              echo "[LOG] [SUCCESS] 成果物を戦利品として保存しました！"
            fi
          fi

      - name: 📤 バックアップ保存
        uses: actions/upload-artifact@v4
        with:
          name: converted-wav-files
          path: output_wav/
