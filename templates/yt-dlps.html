
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="robots" content="noindex, nofollow">
    <meta name="description" content="Gemini programming隊特製 - yt-dlps専用一画面解決システム">
    <meta name="author" content="カカオマメ & Gemini programming隊">
    <meta name="theme-color" content="#1a1a1a">
    <meta property="og:title" content="Xiaomi yt-dlps 統合コントロールパネル">
    <meta property="og:description" content="UUIDタスク管理・リアルタイムポーリング・ストリーミングプレイヤー内蔵">
    <meta property="og:image" content="https://kakaomames.github.io/rei/logo.png">
    <meta property="og:type" content="website">
    
    <title>Gemini programming隊 - yt-dlps動画解決要塞</title>
    
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: #1e1e1e;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 30px;
            width: 100%;
            max-width: 650px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 15px;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 5px;
            color: #ffffff;
        }
        .subtitle {
            font-size: 13px;
            color: #ff3344;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }
        .section {
            margin-top: 20px;
            padding: 20px;
            border-radius: 8px;
            background-color: #252525;
            border: 1px solid #444;
        }
        .hidden {
            display: none !important;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        input[type="text"] {
            width: 100%;
            padding: 15px;
            border: 2px solid #444;
            border-radius: 8px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
        }
        input[type="text"]:focus {
            border-color: #ff3344;
            outline: none;
        }
        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            background-color: #ff3344;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #cc1122;
        }
        .task-info {
            font-family: monospace;
            color: #00ff66;
            font-size: 14px;
            margin-bottom: 10px;
            text-align: left;
        }
        .log-box {
            width: 100%;
            height: 200px;
            background-color: #000;
            color: #00ff66;
            font-family: monospace;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #333;
            overflow-y: auto;
            white-space: pre-wrap;
            text-align: left;
            box-sizing: border-box;
            font-size: 12px;
        }
        video {
            width: 100%;
            border-radius: 8px;
            border: 2px solid #ff3344;
            background-color: #000;
        }
        .btn-danger {
            background-color: #333;
            border: 1px solid #ff3344;
            color: #ff3344;
            margin-top: 15px;
        }
        .btn-danger:hover {
            background-color: #ff3344;
            color: #fff;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 14px;
            color: #00ff66;
            min-height: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://kakaomames.github.io/rei/logo.png" alt="カカオマメ隊員ロゴ" class="logo">
        
        <h1>Gemini programming隊</h1>
        <div class="subtitle">🎯 YT-DLPS TOTAL PROXIED CONTROL PANEL 🎯</div>
        
        <div id="inputSection" class="section">
            <div class="input-group">
                <input type="text" id="videoUrl" placeholder="https://www.youtube.com/shorts/..." autocomplete="off">
                <button id="btnStart">ダウンロードミッション開始 🚀</button>
            </div>
        </div>
        
        <div id="progressSection" class="section hidden">
            <div class="task-info" id="taskIdDisplay">TASK ID: </div>
            <div class="task-info" id="taskStatusDisplay">STATUS: ダウンロード中... ⏳</div>
            <div class="log-box" id="logBox">中継サーバーからのログを待機中...</div>
        </div>
        
        <div id="playerSection" class="section hidden">
            <h3 style="margin-top:0; color:#fff;">🎬 完成動画プレイヤー (ブラウザ強制デコード仕様)</h3>
            <video id="videoPlayer" controls preload="auto" playsinline></video>
            <button id="btnRemove" class="btn-danger">動画の全削除 ＆ 基地クリーンアップ（義務） 💥</button>
        </div>
        
        <div class="status-msg" id="globalStatus"></div>
    </div>

    <script>
        console.log("[LOG] SYSTEM: ブラウザ対応型コントロールセンター起動！");

        let currentTaskId = "";
        let pollingInterval = null;

        document.getElementById('btnStart').addEventListener('click', async function() {
            const videoUrl = document.getElementById('videoUrl').value.trim();
            const globalStatus = document.getElementById('globalStatus');
            
            if (!videoUrl) {
                globalStatus.style.color = "#ff3333";
                globalStatus.innerText = "❌ URLを入力してください！";
                return;
            }

            globalStatus.style.color = "#00ff66";
            globalStatus.innerText = "📡 ネットワークを追尾中...";

            try {
                // 🌟 スマホを怒らせないよう、純粋なURLのまま中継へ発射！
                const response = await fetch(`/yt-dlps?url=${encodeURIComponent(videoUrl)}`);
                if (!response.ok) throw new Error(`サーバーエラー: ${response.status}`);
                
                const data = await response.json();

                if (data.task_id) {
                    currentTaskId = data.task_id;
                    document.getElementById('taskIdDisplay').innerText = `TASK ID: ${currentTaskId}`;
                    document.getElementById('inputSection').classList.add('hidden');
                    document.getElementById('progressSection').classList.remove('hidden');
                    globalStatus.innerText = "📥 進捗を監視中...";

                    startPolling();
                } else {
                    globalStatus.style.color = "#ff3333";
                    globalStatus.innerText = "❌ タスクIDが返ってきませんでした。";
                }
            } catch (error) {
                globalStatus.style.color = "#ff3333";
                globalStatus.innerText = `❌ 通信失敗: ${error.message}`;
            }
        });

        function startPolling() {
            const logBox = document.getElementById('logBox');
            const taskStatusDisplay = document.getElementById('taskStatusDisplay');
            const globalStatus = document.getElementById('globalStatus');

            pollingInterval = setInterval(async () => {
                try {
                    const res = await fetch(`/yt-dlps-status?id=${currentTaskId}&t=${Date.now()}`);
                    if (!res.ok) throw new Error(`ステータスコード: ${res.status}`);
                    
                    const data = await res.json();
                    
                    if (data.log) {
                        logBox.innerText = data.log;
                        logBox.scrollTop = logBox.scrollHeight;
                    }

                    // 🏁 完了検知
                    if (data.status === "complete" || (data.log && data.log.includes("100%"))) {
                        clearInterval(pollingInterval);
                        
                        taskStatusDisplay.innerText = "STATUS: 結合完了！ブラウザでの再生を強制します！ 🎉";
                        globalStatus.innerText = "🎬 動画プレイヤーを起動します！";

                        const player = document.getElementById('videoPlayer');
                        
                        // 🌟🌟【ブラウザ強制覚醒】🌟🌟
                        // 隊員がTXT引っこ抜きで突き止めた「av01 (AV1コーデック)」を
                        // type属性のcodecsにガッツリ明示して、ブラウザの内蔵デコーダーを叩き起こす！
                        const proxyStreamUrl = `/yt-dlps-watch?id=${currentTaskId}`;
                        player.innerHTML = `<source src="${proxyStreamUrl}" type='video/mp4; codecs="av01.0.05M.08, mp4a.40.2"'>`;
                        
                        // プレイヤーのソース構造を再ロードさせて強制再生
                        player.load();
                        
                        document.getElementById('progressSection').classList.add('hidden');
                        document.getElementById('playerSection').classList.remove('hidden');
                    }
                } catch (error) {
                    console.error("[LOG] WARNING: ポーリング中に一時的エラー", error);
                }
            }, 2000);
        }

        document.getElementById('btnRemove').addEventListener('click', async function() {
            const globalStatus = document.getElementById('globalStatus');
            try {
                const res = await fetch(`/yt-dlps-remove?t=${Date.now()}`);
                const data = await res.json();
                
                if (data.success) {
                    alert("💥 爆破完了！スマホ基地内の一時ファイルがクリーンアップされました。");
                    document.getElementById('videoPlayer').innerHTML = "";
                    document.getElementById('playerSection').classList.add('hidden');
                    document.getElementById('inputSection').classList.remove('hidden');
                    document.getElementById('videoUrl').value = "";
                    globalStatus.innerText = "✨ 基地は完全にクリーンになりました。";
                }
            } catch (error) {
                alert("❌ 爆破中継に失敗しました。");
            }
        });
    </script>
</body>
</html>
