<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini programming隊 - yt-dlps動画解決要塞</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.3.5/shaka-player.compiled.js"></script>
    <style>
        /* ...（既存のデザイン設定はそのまま維持！）... */
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background-color: #1e1e1e; border: 2px solid #333; border-radius: 12px; padding: 30px; width: 100%; max-width: 650px; text-align: center; }
        .logo { width: 100px; margin-bottom: 15px; }
        .log-box { width: 100%; height: 150px; background: #000; color: #00ff66; font-family: monospace; padding: 10px; overflow-y: auto; text-align: left; }
        video { width: 100%; background: #000; border: 2px solid #ff3344; }
        button { width: 100%; padding: 15px; background-color: #ff3344; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <img src="https://kakaomames.github.io/rei/logo.png" alt="logo" class="logo">
        <h1>Gemini programming隊</h1>
        <div class="subtitle">🎯 H.264 直結ストリーミングモード 🎯</div>
        
        <div id="inputSection" class="section">
            <input type="text" id="videoUrl" placeholder="URLを貼り付け...">
            <button id="btnStart">ミッション開始 🚀</button>
        </div>

        <div id="progressSection" class="section hidden">
            <div class="log-box" id="logBox">基地と通信中...</div>
        </div>

        <div id="playerSection" class="section hidden">
            <video id="videoPlayer" controls autoplay playsinline></video>
            <button id="btnRemove" style="margin-top:20px;">動画削除 ＆ 基地クリーンアップ 💥</button>
        </div>
    </div>

    <script>
        let currentTaskId = "";
        let shakaPlayer = null;

        // 🌟 改造ポイント: 変換済みH.264なので、まずはブラウザネイティブ再生を優先！
        async function loadVideo(url) {
            const video = document.getElementById('videoPlayer');
            
            // 変換済みmp4ならsrcを直接渡すのがスマホでは一番バッテリーに優しい！
            video.src = url;
            video.load();
            video.play().catch(() => {
                // もしネイティブ再生でコケたらShaka PlayerのWASMにバトンタッチ！
                console.log("ネイティブ再生失敗、Shaka Playerへ移行...");
                initShaka(url);
            });
        }

        async function initShaka(url) {
            const video = document.getElementById('videoPlayer');
            shakaPlayer = new shaka.Player(video);
            await shakaPlayer.load(url);
        }

        document.getElementById('btnStart').addEventListener('click', async () => {
            const url = document.getElementById('videoUrl').value;
            const res = await fetch(`/yt-dlps?url=${encodeURIComponent(url)}`);
            const data = await res.json();
            if(data.task_id) {
                currentTaskId = data.task_id;
                document.getElementById('inputSection').classList.add('hidden');
                document.getElementById('progressSection').classList.remove('hidden');
                poll();
            }
        });

        function poll() {
            const interval = setInterval(async () => {
                const res = await fetch(`/yt-dlps-status?id=${currentTaskId}`);
                const data = await res.json();
                document.getElementById('logBox').innerText = data.log;
                
                if(data.status === "complete") {
                    clearInterval(interval);
                    document.getElementById('progressSection').classList.add('hidden');
                    document.getElementById('playerSection').classList.remove('hidden');
                    loadVideo(`/yt-dlps-watch?id=${currentTaskId}`);
                }
            }, 2000);
        }
        
        // 爆破ボタンは既存コードと同様でOK！
    </script>
</body>
</html>
