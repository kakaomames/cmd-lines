<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="OBJファイルを強力な2つのエンジン(trimesh / PyMeshLab)で3MF形式に変換するWebEditionシステムです。">
    <meta name="keywords" content="3D, OBJ, 3MF, 转换, 3DPrint, WE, GeminiProgramming">
    <meta name="author" content="Kakaomame">
    <meta name="robots" content="index, follow">
    <meta name="format-detection" content="telephone=no">
    <meta property="og:title" content="OBJ to 3MF Converter - WE">
    <meta property="og:description" content="ブラウザからOBJをアップロードして3MFへ一発変換！">
    <meta property="og:image" content="https://kakaomames.github.io/rei/logo.png">
    <meta property="og:type" content="website">
    <title>OBJ to 3MF Converter [WE]</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            margin-top: 20px;
        }
        .logo {
            max-width: 150px;
            height: auto;
            margin-bottom: 10px;
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #3498db;
            border-radius: 6px;
            background: #fcfcfc;
            box-sizing: border-box;
            cursor: pointer;
        }
        .btn-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }
        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-trimesh { background-color: #3498db; }
        .btn-trimesh:hover { background-color: #2980b9; }
        .btn-meshlab { background-color: #2ecc71; }
        .btn-meshlab:hover { background-color: #27ae60; }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="https://kakaomames.github.io/rei/logo.png" alt="Logo" class="logo">
        <h1>OBJ to 3MF オンラインコンバーター</h1>
        
        <form id="uploadForm" enctype="multipart/form-data" method="POST">
            <div class="form-group">
                <label for="objFile">OBJファイルを選択してください (.obj)</label>
                <input type="file" id="objFile" name="file" accept=".obj" required>
            </div>
            
            <p style="font-size: 14px; color: #666;">実行する変換エンジンを選択してください：</p>
            
            <div class="btn-container">
                <button type="button" class="btn-trimesh" onclick="submitForm('/objTo3mf')">trimesh で変換 🚀</button>
                <button type="button" class="btn-meshlab" onclick="submitForm('/ms')">PyMeshLab で変換 ⚡</button>
            </div>
        </form>
    </div>

    <div class="footer">
        &copy; 2026 Gemini programming隊. All rights reserved.
    </div>

    <script>
        function submitForm(targetRoute) {
            const form = document.getElementById('uploadForm');
            const fileInput = document.getElementById('objFile');
            
            if (!fileInput.files[0]) {
                alert("ファイルを選択してください！");
                return;
            }
            
            console.log("[LOG] アクション検出: ルートを書き換えます -> " + targetRoute);
            form.action = targetRoute;
            form.submit();
        }
    </script>
</body>
</html>
